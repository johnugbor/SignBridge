version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: signbridge-backend
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    environment:
      - ENVIRONMENT=development
      - PYTHONUNBUFFERED=1
      - GOOGLE_APPLICATION_CREDENTIALS=/secrets/signbridge-489408-2d7c83cc8240.json
      - GCP_PROJECT_ID=${GCP_PROJECT_ID:-dev-project}
      - GCP_REGION=${GCP_REGION:-us-central1}
      - GEMINI_MODEL_NAME=${GEMINI_MODEL_NAME:-gemini-1.5-pro}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
    volumes:
      - ./app:/app/app
      - ./prompts:/app/prompts
      - ./secrets:/secrets:ro
      - /app/__pycache__
    command: python -m uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    depends_on:
      - redis
    networks:
      - signbridge-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: signbridge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - signbridge-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis-data:

networks:
  signbridge-network:
    driver: bridge
